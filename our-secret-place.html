<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#05040f"/>
<title>Our Secret Place</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --void:#05040f;--card:#13112a;--card2:#1a1735;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.13);
  --text:#e8e4f0;--muted:#6b6490;--muted2:#9990c0;
  --moon:#f0e6c8;--gold:#c8a96e;--gold2:#e8c98e;
  --rose:#c8607a;--rose2:#e8809a;--rose-g:rgba(200,96,122,0.12);
  --star:#a090e8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Crimson Pro',serif;background:var(--void);color:var(--text);overflow-x:hidden;}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
.page{display:none;min-height:100vh;position:relative;z-index:1;}
.page.active{display:flex;flex-direction:column;}
#lock{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(90,70,160,0.2) 0%,transparent 60%);}
.lw{text-align:center;padding:40px 24px;max-width:400px;width:100%;}
.moon{font-size:54px;display:block;margin-bottom:22px;animation:mf 4s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(240,230,200,0.4));}
@keyframes mf{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.ltitle{font-family:'Playfair Display',serif;font-size:clamp(26px,7vw,44px);font-weight:400;color:var(--moon);letter-spacing:1px;line-height:1.2;margin-bottom:8px;}
.lsub{font-size:17px;font-style:italic;color:var(--muted2);margin-bottom:40px;font-weight:300;}
.pw-wrap{position:relative;width:100%;margin-bottom:12px;}
.pw{width:100%;padding:15px 48px 15px 22px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:14px;color:var(--moon);font-family:'Crimson Pro',serif;font-size:18px;outline:none;letter-spacing:4px;text-align:center;transition:all .25s;}
.pw::placeholder{letter-spacing:1px;color:var(--muted);font-size:15px;}
.pw:focus{border-color:rgba(200,96,122,0.5);background:rgba(200,96,122,0.06);box-shadow:0 0 0 3px rgba(200,96,122,0.1);}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;user-select:none;}
.lerr{font-size:13px;color:var(--rose2);font-style:italic;opacity:0;transition:opacity .3s;min-height:18px;margin-bottom:10px;}
.lerr.show{opacity:1;}
.enter{width:100%;padding:15px;border-radius:13px;background:linear-gradient(135deg,var(--rose),#9a3858);border:none;color:white;font-family:'Playfair Display',serif;font-size:17px;cursor:pointer;letter-spacing:1px;transition:all .25s;box-shadow:0 8px 32px rgba(200,96,122,0.35);}
.enter:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(200,96,122,0.5);}
.lhint{font-size:12px;color:var(--muted);margin-top:18px;line-height:1.8;}
.lhint b{color:var(--gold);}
.lhint span{color:var(--star);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.sc{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(5,4,15,0.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.tlogo{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--moon);letter-spacing:1px;display:flex;align-items:center;gap:9px;}
.tr{display:flex;align-items:center;gap:9px;}
.wpill{padding:5px 14px;border-radius:20px;font-size:12px;font-style:italic;}
.wpill.him{background:rgba(200,96,122,0.15);border:1px solid rgba(200,96,122,0.3);color:var(--rose2);}
.wpill.her{background:rgba(160,144,232,0.15);border:1px solid rgba(160,144,232,0.3);color:var(--star);}
.lo-btn{padding:6px 14px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--muted2);font-size:12px;cursor:pointer;font-family:'Crimson Pro',serif;transition:all .2s;}
.lo-btn:hover{border-color:var(--rose);color:var(--rose2);}
.vbody{flex:1;padding:30px 24px;max-width:820px;margin:0 auto;width:100%;}
.wbox{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:36px;position:relative;overflow:hidden;}
.wbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rose),transparent);}
.wlbl{font-family:'Playfair Display',serif;font-size:12px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.wlbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.wdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.wdate{font-size:13px;color:var(--muted2);font-style:italic;}
.moods{display:flex;gap:7px;flex-wrap:wrap;}
.mb{padding:4px 11px;border-radius:20px;font-size:14px;background:transparent;border:1px solid var(--border2);cursor:pointer;transition:all .15s;}
.mb.on{background:var(--rose-g);border-color:rgba(200,96,122,0.4);}
.ntitle{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--moon);font-family:'Playfair Display',serif;font-size:22px;padding:8px 0 10px;outline:none;margin-bottom:14px;transition:border-color .2s;}
.ntitle::placeholder{color:var(--muted);}
.ntitle:focus{border-color:rgba(200,96,122,0.4);}
.nbody{width:100%;background:transparent;border:none;color:var(--text);font-family:'Crimson Pro',serif;font-size:17px;line-height:1.85;padding:0;outline:none;resize:none;min-height:140px;font-weight:300;}
.nbody::placeholder{color:var(--muted);font-style:italic;}
.wfoot{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap;gap:12px;}
.cc{font-size:12px;color:var(--muted);font-style:italic;}
.seal{padding:12px 28px;border-radius:10px;background:linear-gradient(135deg,var(--rose),#9a3858);border:none;color:white;font-family:'Playfair Display',serif;font-size:15px;cursor:pointer;letter-spacing:.5px;transition:all .2s;box-shadow:0 6px 22px rgba(200,96,122,0.3);}
.seal:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(200,96,122,0.48);}
.fhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.ftitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--moon);}
.fsub{font-size:13px;color:var(--muted);font-style:italic;margin-top:2px;}
.filters{display:flex;gap:7px;flex-wrap:wrap;}
.ff{padding:5px 14px;border-radius:20px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--muted2);cursor:pointer;font-family:'Crimson Pro',serif;transition:all .15s;}
.ff.on{background:var(--rose-g);border-color:rgba(200,96,122,0.35);color:var(--rose2);}
.empty{text-align:center;padding:72px 24px;font-family:'Playfair Display',serif;}
.eico{font-size:48px;display:block;margin-bottom:16px;opacity:.45;}
.empty p{font-size:18px;font-style:italic;color:var(--muted2);}
.empty small{font-size:13px;color:var(--muted);margin-top:8px;display:block;}
.nc{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px;overflow:hidden;animation:ci .4s ease;position:relative;}
@keyframes ci{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.nc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--rose),transparent);}
.nc.hers::before{background:linear-gradient(180deg,var(--star),transparent);}
.nch{padding:20px 24px 0;}
.ncm{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px;}
.ncd{font-size:12px;color:var(--muted);letter-spacing:.8px;}
.ncr{display:flex;align-items:center;gap:8px;}
.ncmood{font-size:15px;}
.ncfrom{font-size:11px;font-style:italic;padding:3px 10px;border-radius:10px;}
.ncfrom.him{background:rgba(200,96,122,0.12);color:var(--rose2);}
.ncfrom.her{background:rgba(160,144,232,0.12);color:var(--star);}
.nctitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--moon);line-height:1.3;margin-bottom:13px;}
.ncbw{padding:0 24px;}
.ncb{font-size:16px;color:#b8b0d0;line-height:1.85;font-weight:300;font-style:italic;max-height:115px;overflow:hidden;transition:max-height .45s ease;position:relative;}
.ncb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--card));pointer-events:none;transition:opacity .3s;}
.ncb.exp{max-height:3000px;}
.ncb.exp::after{opacity:0;}
.ncf{display:flex;align-items:center;justify-content:space-between;padding:13px 24px 17px;margin-top:13px;border-top:1px solid var(--border);flex-wrap:wrap;gap:9px;}
.nca{display:flex;align-items:center;gap:8px;}
.ebtn{font-size:13px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:'Crimson Pro',serif;font-style:italic;transition:color .2s;}
.ebtn:hover{color:var(--gold2);}
.hbtn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:transparent;border:1px solid var(--border2);color:var(--muted2);font-size:13px;cursor:pointer;font-family:'Crimson Pro',serif;transition:all .2s;}
.hbtn:hover,.hbtn.loved{background:var(--rose-g);border-color:rgba(200,96,122,0.4);color:var(--rose2);}
.hbtn .hi{transition:transform .3s;}
.hbtn.loved .hi{transform:scale(1.35);}
.dbtn{padding:5px 10px;border-radius:7px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;}
.dbtn:hover{color:var(--rose);background:var(--rose-g);}
.ra{margin:0 24px 16px;padding:15px;background:rgba(160,144,232,0.05);border:1px solid rgba(160,144,232,0.12);border-radius:10px;}
.rlbl{font-size:11px;color:var(--star);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.rtxt{font-size:15px;color:#c0b8e0;line-height:1.75;font-style:italic;font-weight:300;}
.rin{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(160,144,232,0.2);color:var(--star);font-family:'Crimson Pro',serif;font-size:15px;padding:6px 0;outline:none;resize:none;min-height:58px;font-style:italic;font-weight:300;line-height:1.65;}
.rin::placeholder{color:var(--muted);}
.rf{display:flex;justify-content:flex-end;margin-top:9px;}
.rbtn{padding:7px 18px;border-radius:8px;background:rgba(160,144,232,0.18);border:1px solid rgba(160,144,232,0.3);color:var(--star);font-family:'Crimson Pro',serif;font-size:13px;cursor:pointer;transition:all .2s;}
.rbtn:hover{background:rgba(160,144,232,0.28);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:13px 24px;font-size:14px;color:var(--moon);font-style:italic;box-shadow:0 16px 48px rgba(0,0,0,.5);opacity:0;transition:all .35s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(200,96,122,.2);border-radius:4px;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:800;display:none;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.ovb{background:var(--card2);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:340px;width:92%;text-align:center;animation:pop .22s ease;}
@keyframes pop{from{transform:scale(.93);opacity:0;}to{transform:scale(1);opacity:1;}}
.ovb h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--moon);margin-bottom:10px;}
.ovb p{font-size:14px;color:var(--muted2);font-style:italic;line-height:1.65;margin-bottom:22px;}
.ovbtns{display:flex;gap:10px;}
.oc{flex:1;padding:10px;border-radius:9px;background:transparent;border:1px solid var(--border2);color:var(--muted2);cursor:pointer;font-family:'Crimson Pro',serif;font-size:14px;}
.od{flex:1;padding:10px;border-radius:9px;background:rgba(200,96,122,.2);border:1px solid rgba(200,96,122,.4);color:var(--rose2);cursor:pointer;font-family:'Crimson Pro',serif;font-size:14px;}
.od:hover{background:rgba(200,96,122,.32);}
.sin{width:100%;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:9px;color:var(--moon);font-family:'Crimson Pro',serif;font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s;}
.sin:focus{border-color:rgba(200,169,110,.5);}
.slbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);display:block;margin-bottom:5px;text-align:left;}
@media(max-width:560px){.topbar{padding:13px 16px;}.vbody{padding:18px 14px;}.wbox{padding:18px 16px;}.nch{padding:16px 16px 0;}.ncbw,.ncf,.ra{padding-left:16px;padding-right:16px;}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="page active" id="lock">
  <div class="lw">
    <span class="moon">&#127769;</span>
    <h1 class="ltitle">Our Secret Place</h1>
    <p class="lsub">where only we exist</p>
    <div class="pw-wrap">
      <input class="pw" id="pw" type="password" placeholder="whisper the password..." autocomplete="off" onkeydown="if(event.key==='Enter')tryEnter()"/>
      <button class="eye" onmousedown="toggleEye(1)" onmouseup="toggleEye(0)" ontouchstart="toggleEye(1)" ontouchend="toggleEye(0)">&#128065;</button>
    </div>
    <p class="lerr" id="lerr">that is not quite right, love...</p>
    <button class="enter" onclick="tryEnter()">enter our world &#10022;</button>
    <p class="lhint">Default passwords: <b>moonlight</b> (him) &amp; <b>rosepetal</b> (her)<br/><span onclick="openSet()">change passwords</span></p>
  </div>
  <div class="sc" id="sc"></div>
</div>

<div class="page" id="vault">
  <div class="topbar">
    <div class="tlogo">&#127769; Our Secret Place</div>
    <div class="tr">
      <div class="wpill" id="wpill"></div>
      <button class="lo-btn" onclick="lockOut()">lock &#10022;</button>
    </div>
  </div>
  <div class="vbody">
    <div class="wbox" id="wbox" style="display:none;">
      <div class="wlbl">a new letter for her</div>
      <div class="wdr">
        <span class="wdate" id="wdate"></span>
        <div class="moods">
          <button class="mb on" data-m="&#127769;" onclick="pickMood(this)">&#127769;</button>
          <button class="mb" data-m="&#127801;" onclick="pickMood(this)">&#127801;</button>
          <button class="mb" data-m="&#10024;" onclick="pickMood(this)">&#10024;</button>
          <button class="mb" data-m="&#127754;" onclick="pickMood(this)">&#127754;</button>
          <button class="mb" data-m="&#128293;" onclick="pickMood(this)">&#128293;</button>
          <button class="mb" data-m="&#128171;" onclick="pickMood(this)">&#128171;</button>
        </div>
      </div>
      <input class="ntitle" id="ntitle" placeholder="give this letter a name..." maxlength="80"/>
      <textarea class="nbody" id="nbody" placeholder="my darling..." maxlength="3000" oninput="upCC()"></textarea>
      <div class="wfoot">
        <span class="cc" id="cc">0 / 3000</span>
        <button class="seal" onclick="sendNote()">seal &amp; send &#10022;</button>
      </div>
    </div>
    <div class="fhd">
      <div><div class="ftitle">Our Letters</div><div class="fsub" id="fsub"></div></div>
      <div class="filters">
        <button class="ff on" onclick="setF('all',this)">all</button>
        <button class="ff" onclick="setF('his',this)">his</button>
        <button class="ff" onclick="setF('hers',this)">hers</button>
        <button class="ff" onclick="setF('loved',this)">loved &#9829;</button>
      </div>
    </div>
    <div id="feed"></div>
  </div>
</div>

<div class="ov" id="delOv">
  <div class="ovb">
    <h3>Delete this letter?</h3>
    <p>this moment will leave our vault forever.</p>
    <div class="ovbtns">
      <button class="oc" onclick="closeOv('delOv')">keep it</button>
      <button class="od" id="delOk">let it go</button>
    </div>
  </div>
</div>

<div class="ov" id="setOv" onclick="if(event.target===this)closeOv('setOv')">
  <div class="ovb" style="text-align:left;max-width:360px;">
    <h3 style="margin-bottom:20px;">Change Passwords</h3>
    <label class="slbl">his new password</label>
    <input class="sin" id="sHim" type="password" placeholder="leave blank to keep current" autocomplete="off"/>
    <label class="slbl">her new password</label>
    <input class="sin" id="sHer" type="password" placeholder="leave blank to keep current" autocomplete="off"/>
    <div class="ovbtns" style="margin-top:8px;">
      <button class="oc" onclick="closeOv('setOv')">cancel</button>
      <button class="od" style="background:rgba(200,169,110,.15);border-color:rgba(200,169,110,.4);color:var(--gold2);" onclick="savePW()">save &#10022;</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let PW=JSON.parse(localStorage.getItem('osp_pw')||'null')||{him:'moonlight',her:'rosepetal'};
let notes=JSON.parse(localStorage.getItem('osp_notes')||'[]');
let who=null,mood='\u{1F319}',filt='all',pendDel=null;

(function(){
  const cv=document.getElementById('c'),cx=cv.getContext('2d');
  let W,H,stars=[];
  const rsz=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
  rsz();window.addEventListener('resize',rsz);
  for(let i=0;i<240;i++)stars.push({px:Math.random(),py:Math.random(),r:Math.random()*1.3+.2,a:Math.random(),s:Math.random()*.005+.001,t:Math.random()*Math.PI*2});
  document.getElementById('sc').textContent='\u2736 '+stars.length+' stars just for you two \u2736';
  (function draw(){
    cx.clearRect(0,0,W,H);
    stars.forEach(s=>{s.t+=s.s;cx.beginPath();cx.arc(s.px*W,s.py*H,s.r,0,Math.PI*2);cx.fillStyle='rgba(200,200,255,'+(s.a*(.5+.5*Math.sin(s.t)))+')';cx.fill();});
    requestAnimationFrame(draw);
  })();
})();

function tryEnter(){
  const v=document.getElementById('pw').value.trim();
  const err=document.getElementById('lerr');
  if(v===PW.him){go('him');}
  else if(v===PW.her){go('her');}
  else{
    err.classList.add('show');
    const p=document.getElementById('pw');
    p.style.borderColor='rgba(200,96,122,.65)';p.value='';
    setTimeout(()=>{err.classList.remove('show');p.style.borderColor='';},2600);
  }
}
function go(w){
  who=w;
  document.getElementById('lock').classList.remove('active');
  document.getElementById('vault').classList.add('active');
  const pill=document.getElementById('wpill');
  pill.textContent=w==='him'?'\u2736 him':'\u2736 her';
  pill.className='wpill '+w;
  document.getElementById('wbox').style.display=w==='him'?'block':'none';
  document.getElementById('wdate').textContent=new Date().toLocaleDateString('en-UG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('pw').value='';
  renderFeed();
  toast(w==='him'?'welcome back, my love \u2736':'she is here \u2736 your letters await');
}
function lockOut(){who=null;document.getElementById('vault').classList.remove('active');document.getElementById('lock').classList.add('active');}
function toggleEye(s){document.getElementById('pw').type=s?'text':'password';}
function openSet(){document.getElementById('setOv').classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
function savePW(){
  const h=document.getElementById('sHim').value.trim();
  const r=document.getElementById('sHer').value.trim();
  if(h)PW.him=h;if(r)PW.her=r;
  localStorage.setItem('osp_pw',JSON.stringify(PW));
  document.getElementById('sHim').value='';document.getElementById('sHer').value='';
  closeOv('setOv');toast('passwords updated \u2736');
}
function pickMood(btn){document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');mood=btn.dataset.m;}
function upCC(){document.getElementById('cc').textContent=document.getElementById('nbody').value.length+' / 3000';}
function sendNote(){
  const t=document.getElementById('ntitle').value.trim();
  const b=document.getElementById('nbody').value.trim();
  if(!t){toast('give your letter a name, love \u2736');return;}
  if(!b){toast('your letter is empty \u2736');return;}
  notes.unshift({id:Date.now(),from:'him',title:t,body:b,mood,date:new Date().toISOString(),loved:false,reply:''});
  save();
  document.getElementById('ntitle').value='';
  document.getElementById('nbody').value='';
  upCC();renderFeed();
  toast('your letter has been sealed \u2736');
  setTimeout(()=>document.getElementById('feed').scrollIntoView({behavior:'smooth',block:'start'}),300);
}
function setF(f,btn){filt=f;document.querySelectorAll('.ff').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderFeed();}
function renderFeed(){
  let list=[...notes];
  if(filt==='his')list=list.filter(n=>n.from==='him');
  if(filt==='hers')list=list.filter(n=>n.from==='her');
  if(filt==='loved')list=list.filter(n=>n.loved);
  const total=notes.length;
  document.getElementById('fsub').textContent=total===0?'no letters yet':total===1?'1 letter in our vault':total+' letters in our vault';
  const feed=document.getElementById('feed');
  if(!list.length){
    const msgs={all:'your vault is empty',his:'no letters from him yet',hers:"she hasn't written yet",loved:'no loved letters yet'};
    const hints={all:who==='him'?'write your first letter above \u2736':'waiting for his words \u2736'};
    feed.innerHTML='<div class="empty"><span class="eico">\u{1F319}</span><p>'+msgs[filt]+'</p><small>'+(hints[filt]||'waiting for love to fill this space \u2736')+'</small></div>';
    return;
  }
  feed.innerHTML=list.map(cardHTML).join('');
}
function cardHTML(n){
  const d=new Date(n.date);
  const ds=d.toLocaleDateString('en-UG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const isHis=n.from==='him';
  const canLove=who==='her'&&isHis;
  const canDel=(who==='him'&&isHis)||(who==='her'&&!isHis);
  const replyBlock=isHis?'<div class="ra"><div class="rlbl">her reply</div>'+(n.reply?'<div class="rtxt">&ldquo;'+esc(n.reply)+'&rdquo;</div>':(who==='her'?'<textarea class="rin" id="ri-'+n.id+'" placeholder="write back to him..." rows="2"></textarea><div class="rf"><button class="rbtn" onclick="sendReply('+n.id+')">send reply \u2736</button></div>':'<div class="rtxt" style="opacity:.35;font-size:13px;">no reply yet...</div>'))+'</div>':'';
  return '<div class="nc'+(isHis?'':' hers')+'" id="nc-'+n.id+'"><div class="nch"><div class="ncm"><span class="ncd">'+ds+'</span><div class="ncr"><span class="ncmood">'+n.mood+'</span><span class="ncfrom '+n.from+'">'+(isHis?'from him':'from her')+'</span></div></div><div class="nctitle">'+esc(n.title)+'</div></div><div class="ncbw"><div class="ncb" id="nb-'+n.id+'">'+esc(n.body).replace(/\n/g,'<br/>')+'</div></div>'+replyBlock+'<div class="ncf"><div class="nca"><button class="ebtn" onclick="expand('+n.id+')">read more \u2736</button>'+(canLove||n.loved?'<button class="hbtn'+(n.loved?' loved':'')+'" onclick="loveNote('+n.id+')"><span class="hi">'+(n.loved?'\u2665':'\u2661')+'</span>&nbsp;'+(n.loved?'loved':'love this')+'</button>':'')+'</div>'+(canDel?'<button class="dbtn" onclick="askDel('+n.id+')">\u2715</button>':'')+'</div></div>';
}
function expand(id){
  const b=document.getElementById('nb-'+id);
  const btn=document.getElementById('nc-'+id).querySelector('.ebtn');
  const ex=b.classList.toggle('exp');
  btn.textContent=ex?'collapse \u2736':'read more \u2736';
}
function loveNote(id){
  if(who!=='her')return;
  const n=notes.find(n=>n.id===id);if(!n)return;
  n.loved=!n.loved;save();renderFeed();
  if(n.loved)toast('\u2665 loved \u2736');
}
function sendReply(id){
  if(who!=='her')return;
  const n=notes.find(n=>n.id===id);
  const inp=document.getElementById('ri-'+id);
  if(!n||!inp)return;
  const t=inp.value.trim();if(!t){toast('write something, love \u2736');return;}
  n.reply=t;save();renderFeed();toast('your reply was sent \u2736');
}
function askDel(id){
  pendDel=id;
  document.getElementById('delOv').classList.add('open');
  document.getElementById('delOk').onclick=()=>{
    notes=notes.filter(n=>n.id!==pendDel);
    save();closeOv('delOv');renderFeed();toast('letter released \u2736');
  };
}
function save(){localStorage.setItem('osp_notes',JSON.stringify(notes));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let tT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2800);}
setTimeout(()=>document.getElementById('pw').focus(),350);
</script>
</body>
</html>
